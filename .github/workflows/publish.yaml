name: Publish to Comfy Registry

# Registry publish only when you explicitly run this workflow.
# Do NOT run on push to main (e.g. zhmd/ docs-only commits).
on:
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Publish to Comfy Registry
        uses: Comfy-Org/publish-node-action@main
        with:
          personal_access_token: ${{ secrets.REGISTRY_ACCESS_TOKEN }}
